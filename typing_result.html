<!DOCTYPE html>
<html lang="en">
    <head>
        <tilte>Language Master - Typing Skill Result</tilte>
        <link rel="preconnect" href="https://font.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&dispay=swap" rel="styleshet">

        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }

            body{
                font-samily: 'Kalam', cursive;
                background: #eef4fb;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 2rem;
                position: relative;
                overflow-x: hidden;
            }


            .card {
                width: 600px;
                max-width: 100%;
                background: white;
                border: 2px solid #bcc8d7;
                border-radius: 18px 14px 20px 12px;
                padding: 2.7rem 3rem 2.3rem;
                box-shadow: 0 5px 18px rbga(0,0,0,0.5);
            }


            .result-header { text-align: center; margin-bottom: 2rem; }
            .result-title { font-size: 2rem; color: #243447; margin-bottom: 0.4rem; }
            .result-msg { color: #6a7280; font-size: 1rem; }

            .score-box {
                display: flex;
                justify-content: center;
                align-items: center;
                background: #f8fbff;
                border: 2px solid #d9e4ef;
                border-radius: 14px 18px 13px 17px;
                padding: 1.2rem;
                margin-bottom: 2rem;
                transform: rotate(-1deg);
            }

            .score-number{ font-size: 3rem; font-weight: bold; color: #243447; }
            .score-divider { font-size: 2rem; color: #b8c4d2; }
            .score-total { font-size: 2rem; color: #b8c4d2; }
            .score-label { margin-top: 4px; text-align: center; color: #8b95a3; font-size: 0.9rem;}

            .summary-label {
                color: #8b95a3;
                margin-bottom: 0.8rem;
                letter-spacing: 2px;
                text-transform: lowercase;
                font-size: 0.85rem;
            }

            .target-ref{
                background: #f0f6ff;
                border: 1.5px solid #bfdbfe;
                border-radius: 8px;
                padding: 0.7rem 1rem;
                margin-bottom: 1.2rem;
                font-size: 0.88rem;
                color: #243447;
            }

            .target-ref strong { color: #1d4ed8; }

            table {
                width: 100%;
                border-collapse: collapse;
                margin-bottom: 2rem;
                font-size: 0.92rem;
            }

            thead tr { background: #32465a; color: white; }
            thead th {
                padding: 10px 12px;
                text-align: left;
                font-size: 0.85rem;
            }

            thead th:last-child { text-align: center; }
            
            tbody tr:nth-child(even) { background: #f7fbff; }
            
            tbody td {
                padding: 10px 12px;
                border-bottom: 1px solid #e4ebf3;
                color: #243447;
                vertical-align: top;
            }

            .q-num { color: #7a8694; font-weight: bold; white-space: nowrap; }
            .your-answer-correct { color: #4c8b57; font-weight: bold; }
            .your-answer-wrong { color: #b75a5a; font-weight: bold;}

            .btn-home {
                flex: 1;
                background: 2px solid #d4deea;
                border: 2px solid #d4deea;
                border-radius: 14px 10px 16px 12px;
                padding: 12px;
                cursor: pointer;
                font-family: 'Kalam', cursive;
                font-size: 1rem;
                color: #66717f;
                transition: 0.15s;
            }

            .btn-home:hover { background: #f8fbff; }

            .btn-retry {
                flex: 2;
                border: none;
                background: #32465a;
                color: white;
                padding: 12px;
                cursor: pointer;
                border-radius: 13px 17px 11px 15px;
                font-family: 'Kalam', cursive;
                font-size: 1rem;
                transition: 0.15s;
            }

            .btn-retry:hover { opacity: 0.9; }
            .btn-retry:active { transform: scale (0.98);}

            .doodle { position: fixed; z-index:-1; image-rendering:pixelated; opacity:0.9; }
            .stars { width: 130px; top: 70px; right: 100px; }
            .worm { width: 100px; top:80px; left: 90px; transform: rotate(180 deg);}
            .cat { width: 140px; right: 70px; bottom: 80px; }
            .guy { width: 100px; left: 200px; bottom: 70px; }
        </style>
    </head>


<body>
    <img src="pixiart-drawing.png" class="doodle stars">
    <img src="worm.png"   class="doodle worm">
    <img src="cat.png"    class="doodle cat">
    <img src="guy.png"    class="doodle guy">

    <div class="card">
        <div class="result-header">
            <div class="result-title">Typing Test Complete</div>
            <div class="result-msg" id="resultMsg"></div>
        </div>

        <div class="score-box">
            <div>
                <div style="display:flex"; align-items:baseline; gap:6px;>
                    <span class="score-number" id="scoreNumber">0</span>
                    <span class="score-divider">/</span>
                    <span class="score-total" id="totalAttempts">10</span>
                </div>
                <div class="score-label">Correct Attempts</div>
            </div>
        </div>

        <p class="summary-label">Attempt Summar</p>

        <div class="targer-ref">
            <strong>Target:</strong> The quick brown fox jumps over the lazy dog
        </div>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>What you Typed</th>
                    <th style="text-align:center">Result</th>
                </tr>
            </thead>
            <tbody id="summaryBody"></tbody>
        </table>

        <div class="btn-row">
            <button class="btn-home" onclick="goHome()">Home</button>
            <button class="btn-retry" onclick="retryQuiz()">TRY AGAIN</button>
        </div>
        </div>

<script>
    const score = parseInt(sessionStorage.getItem('typingScore')) || 0;
    const results = JSON.parse(sessionStorage.getItem('typingResults'))  || [];
    const attempts = parseInt(sessionStorage.getItem('typingAttempts')) || results.length;


    function getMessage(s, total) {
        if (s === total && total === 10) return "perfect score, you must be the chosen one.";
        if (s === total) return "everything is correct. WOAH";
        if (s >= total * 0.8) return "a future typing-guru in the making!";
        if (s >= total * 0.6) return "super cool!! well done.";
        if (s >= total * 0.4) return "you're getting there! keep practising";
        return "practice makes purr-fect";

    }

    document.getElementById('scoreNumber').textContent = score;
    document.getElementById('totalAttempts').textContent= attemps;
    document.getElementById('resultMsg').textContent = getMessage(score,attempts);

    const tbody = document.getElementById('summaryBody');


    results.forEach((r, i) =>{
        const tr = document.createElement('tr');
        const cls = r.ok ? 'your-answer-correct' : 'your-answer-wrong';
        const status = r.ok ? 'nice' : 'oops';


        tr.innerHTML = `
            <td class = "q-num">${r.attempt}</td>
            <td class ="${cls}">${escapeHtml(r.typed)}</td>
            <td style="text-align:center">${status}</td>
            `;
            tbody.appendChild(tr);
        
    }


);

function escapeHtml(str){
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')


            }

            function goHome() {window.location.href = 'index.html';}
            function retryQuiz() {window.location.href = 'typing_quiz.html';}



</script>        
</body>    
</html>
