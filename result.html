<!DOCTYPE html>
<html lang="en">
<head>
    <title>Spell Checker - Result</title>
<!-- handwriting but still readable -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
<!--kalam, cal font, swirly, astra??-->

<style>

    /* reset thingy */
    *{
        box-sizing:border-box;
        margin:0;
        padding:0;
    }

    body{
        font-family:'Kalam', cursive;
        background:#eef4fb;
        min-height:100vh;

        display:flex;
        justify-content:center;
        align-items:center;

        padding:2rem;

        position:relative;
        overflow-x:hidden;
    }

    /* long live doodles */
    .top-doodle{
        position:absolute;
        top:40px;
        right:80px;
    }

    /* maybe flowers? idk */
    .bottom-doodle{
        position:absolute;
        bottom:50px;
        left:70px;
    }

    /* the main card thingy */
    .card{
        width:640px;
        max-width:100%;

        background:white;

        border:2px solid #bcc8d7;

        /* making it slightly wonky on purpose*/
        border-radius:18px 14px 20px 12px;

        padding:2.7rem 3rem 2.3rem;

        position:relative;

        box-shadow:
            0 5px 18px rgba(0,0,0,0.05);
    }

    /* done yay */
    .result-header{
        text-align:center;
        margin-bottom:2rem;
    }

    .result-title{
        font-size:2rem;
        color:#243447;
        margin-bottom:0.4rem;
    }

    .result-msg{
        color:#6a7280;
        font-size:1rem;
    }

    /* scoressss....my precioussss */
    .score-box{
        display:flex;
        justify-content:center;
        align-items:center;

        background:#f8fbff;

        border:2px solid #d9e4ef;

        border-radius:14px 18px 13px 17px;

        padding:1.2rem;

        margin-bottom:2rem;

        transform:rotate(-1deg);
    }

    .score-number{
        font-size:3rem;
        font-weight:bold;
        color:#243447;
    }

    .score-divider{
        font-size:2rem;
        color:#b8c4d2;
    }

    .score-total{
        font-size:2rem;
        color:#b8c4d2;
    }

    .score-label{
        margin-top:4px;
        text-align:center;
        color:#8b95a3;
        font-size:0.9rem;
    }

    /* tiny recap for idiots like me*/
    .summary-label{
        color:#8b95a3;
        margin-bottom:0.8rem;

        letter-spacing:2px;
        text-transform:lowercase;

        font-size:0.85rem;
    }

    table{
        width:100%;
        border-collapse:collapse;
        margin-bottom:2rem;

        font-size:1rem;
    }

    thead tr{
        background:#32465a;
        color:white;
    }

    thead th{
        padding:12px;
        text-align:left;
        font-size:0.9rem;
    }

    thead th:last-child{
        text-align:center;
    }

    tbody tr:nth-child(even){
        background:#f7fbff;
    }

    tbody td{
        padding:12px;
        border-bottom:1px solid #e4ebf3;

        color:#243447;
    }

    .q-num{
        color:#7a8694;
        font-weight:bold;
    }

    .correct-word{
        font-weight:bold;
    }

    /* green = yay */
    .your-answer-correct{
        color:#4c8b57;
        font-weight:bold;
    }

    /* red = oh shi */
    .your-answer-wrong{
        color:#b75a5a;
        font-weight:bold;
    }

    /* button gang */
    .btn-row{
        display:flex;
        gap:12px;
    }

    .btn-home{
        flex:1;

        background:white;

        border:2px solid #d4deea;

        border-radius:14px 10px 16px 12px;

        padding:12px;

        cursor:pointer;

        font-family:'Kalam', cursive;
        font-size:1rem;

        color:#66717f;

        transition:0.15s;
    }
    .doodle{
    position: fixed;
    z-index: -1;
    image-rendering: pixelated;
    opacity: 0.9;
}

    .stars{
        width: 130px;
        top: 70px;
        right: 100px;
    }

    .worm{
        width: 100px;
        top: 80px;
        left: 90px;
        transform: rotate(180deg);
    }

    .eia{
        width: 110px;
        left: 90px;
        bottom: 180px;
    }

    .cat{
        width: 140px;
        right: 70px;
        bottom: 80px;
    }

    .guy{
        width: 100px;
        left: 200px;
        bottom: 70px;
        transform: rotate(-8deg);
    }

    .btn-home:hover{
        background:#f8fbff;
    }

    .btn-retry{
        flex:2;

        border:none;

        background:#32465a;
        color:white;

        padding:12px;

        cursor:pointer;

        border-radius:13px 17px 11px 15px;

        font-family:'Kalam', cursive;
        font-size:1rem;

        transition:0.15s;
    }

    .btn-retry:hover{
        opacity:0.9;
    }

    .btn-retry:active{
        transform:scale(0.98);
    }

</style>
</head>    


<body>
    <img src="pixiart-drawing.png" class="doodle stars">
    <img src="worm.png" class="doodle worm">
    <img src="eia.png" class="doodle eia">
    <img src="cat.png" class="doodle cat">
    <img src="guy.png" class="doodle guy">
    <div class="card">
        <div class="result-header">
            <div class="result-title">Quiz Complete</div>
            <div class="result-msg" id="resultMsg"></div>
        </div>

        <div class="score-box">
            <div>
                <div style="display:flex; align-items:baseline; gap:6px;">
                    <span class="score-number" id="scoreNumber">0</span>
                    <span class="score-divider">/</span>
                    <span class="score-total">10</span>
                </div>
                <div class="score-label">Your Score</div>
            </div>
        </div>

        <p class="summary-label">Answer Summary</p>

        <table>
            <thead>
                <tr>
                    <th>Q</th>
                    <th>Correct Word</th>
                    <th>Your Answer</th>
                    <th>Result</th>
                </tr>
            </thead>
            <tbody id="summaryBody">
            </tbody>
        </table>

        <div class="btn-row">
            <button class="btn-home" onclick="goHome()">Home</button>
            <button class="btn-retry" onclick="retryQuiz()">TRY AGAIN</button>
        </div>
    </div>

<script>

    // retrieving quiz stuff. hopefully it survived
    const score = parseInt(sessionStorage.getItem('spellScore')) || 0;
    const results = JSON.parse(sessionStorage.getItem('spellResults')) || [];


    // little messages because empty space felt sad
    function getMessage(score) {

        if (score === 10) {
            return "okay wow all of them???";
        }

        if (score >= 8) {
            return "that went pretty well";
        }

        if (score >= 6) {
            return "not bad honestly";
        }

        if (score >= 4) {
            return "a few sneaky words got you";
        }

        return "spelling is hard anyway";
    }


    // putting the score on the page n stuff
    document.getElementById("scoreNumber").textContent = score;
    document.getElementById("resultMsg").textContent = getMessage(score);


    const tbody = document.getElementById("summaryBody");


    results.forEach((r, index) => {

        const tr = document.createElement("tr");

        // green yay, red nay
        const answerClass =
            r.ok
            ? "your-answer-correct"
            : "your-answer-wrong";

        // words > symbols
        const status =
            r.ok
            ? "nice"
            : "oops";

        tr.innerHTML = `
            <td class="q-num">${index + 1}</td>
            <td class="correct-word">${r.word}</td>
            <td class="${answerClass}">${r.yours}</td>
            <td>${status}</td>
        `;
        tbody.appendChild(tr);

    });


    // FROM THE STARTTTT
    function goHome() {

        window.location.href = "index.html";

    }

    function retryQuiz() {

        window.location.href = "quiz.html";

    }

</script>

</body>

</html>
